services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: specvsreality
      POSTGRES_PASSWORD: specvsreality
      POSTGRES_DB: specvsreality
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specvsreality -d specvsreality"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      # Match worker heartbeat (30m) so long-running handlers do not drop the connection mid-job.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit heartbeat 1800 consumer_timeout 7200000"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://specvsreality:specvsreality@postgres:5432/specvsreality
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_VIRTUAL_HOST: /
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE_NAME: messages
      CORS_ORIGINS: '["http://localhost:8080","http://127.0.0.1:8080","http://localhost:5173","http://127.0.0.1:5173","http://localhost:5174","http://127.0.0.1:5174","http://localhost:4173","http://127.0.0.1:4173"]'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    # So OPIK_URL_OVERRIDE can use host.docker.internal when Opik runs on the host / another compose stack.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./worker/.env
    environment:
      DATABASE_URL: postgresql+psycopg://specvsreality:specvsreality@postgres:5432/specvsreality
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_VIRTUAL_HOST: /
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE_NAME: messages
      REPO_CLONE_ROOT: /repos
      GIT_CLONE_TOKEN: ${GIT_CLONE_TOKEN:-}
      GIT_CLONE_USERNAME: ${GIT_CLONE_USERNAME:-x-access-token}
      # Logfire/Opik: use worker/.env (env_file). Do not set LOGFIRE_* here with ${VAR:-}
      # defaults — an empty value overrides env_file and forces Opik OTLP (404 if Opik is down).
    volumes:
      - repo_clones:/repos
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/tmp
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki

volumes:
  pgdata:
  repo_clones:
  loki_data:
  grafana_data:
  promtail_positions:
