# Committed defaults — clone and run with local RabbitMQ without inventing queue names.
# Override with environment variables (RABBITMQ_*); see .env.example.

host: localhost
port: 5672
virtual_host: /
queue_name: messages
prefetch_count: 1
heartbeat: 1800
blocked_connection_timeout: 0
reconnect_delay_seconds: 5
username: guest
password: ""
